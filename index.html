<!DOCTYPE html>
<head>
    <title>DEMO: CAMERA CAPTURE</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
    <link href="//netdna.bootstrapcdn.com/font-awesome/3.2.1/css/font-awesome.css" rel="stylesheet">
    <style>
        video::-webkit-media-controls-play-button{ display: flex !important;}
    </style>
 </head>
<body>
 <div style="font-size: 14px; line-height: 1.5em;"> 
     <label for="recorder"><i class="icon-camera-retro icon-3x"></i><span> record a video</span></label>
<input type="file" accept="video/*" capture="camera" id="recorder" style="visibility:hidden;">
    </div>
<video id="player" controls></video>
<script>
  var recorder = document.getElementById('recorder');
  var player = document.getElementById('player');

  recorder.addEventListener('change', function(e) {
    var file = e.target.files[0];
    // Do something with the video file.
    player.src = URL.createObjectURL(file);
  });
</script>
</body>
</html>
